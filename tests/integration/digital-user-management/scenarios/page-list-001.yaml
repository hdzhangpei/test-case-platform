version: "2.0"
metadata:
  id: page-list-001
  name: 分页查询数字人列表
  requirement: digital-user-management
  author: test
  created: 2026-06-11
  tags:
    - 查询
    - 分页
    - SMOKE
config:
  baseUrl: ${env:TC_BASE_URL}
  cookieEnv: TC_COOKIE
  headers:
    content-type: application/json;charset=UTF-8
    group: staging
    x-retail-locale: CN
steps:
  - id: query-list
    name: 分页查询数字人列表
    request:
      method: POST
      path: /mtop/meta/eiam/admin/digitalUser/pageDigitalUserList
      body:
        sceneList:
          - new_retail_cn
        pageNum: 1
        pageSize: 20
        areaId: CN
    expected:
      status: 200
      assertions:
        - type: not_null
          target: $
        - type: equals
          target: code
          value: 0
      capture:
        totalCount: data.total
